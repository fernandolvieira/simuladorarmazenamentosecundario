<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FileSystem Simulator - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; text-align: center; padding: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto 20px; }
        .stat-card { background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        
        .disk-grid { 
            display: grid; grid-template-columns: repeat(10, 45px); gap: 5px; 
            justify-content: center; background: #333; padding: 15px; border-radius: 10px; margin: 0 auto; width: fit-content;
        }
        .block { 
            width: 45px; height: 45px; background: #444; border-radius: 4px; font-size: 0.7rem; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold;
        }
        
        /* Cores por Arquivo (ID) */
        .file-active { background: #2196F3; color: white; border: 1px solid #fff; }
        .file-deleted { background: #555; color: #888; border: 1px dashed #777; }
        .file-corrupted { background: #f44336; color: white; animation: blink 0.8s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .tech-box { grid-column: span 3; background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        
        button { padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; }
        .btn-save { background: #2e7d32; }
        .btn-del { background: #d84315; }
        .btn-rec { background: #6a1b9a; }
        .btn-def { background: #0277bd; }
        
        #log { margin-top: 20px; font-family: monospace; color: #00e676; background: #000; padding: 10px; border-radius: 5px; height: 40px; overflow: hidden; }
        .alert-active { color: #ffeb3b; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <h2>Simulador de File System & Forensics</h2>

    <div class="dashboard">
        <div class="tech-box">
            Hardware: 
            <select id="speed" style="padding:5px; background:#444; color:#fff;">
                <option value="400">HDD (Mecânico)</option>
                <option value="100">SSD SATA</option>
                <option value="20">NVMe M.2</option>
            </select>
        </div>
        <div class="stat-card">Fragmentação: <span id="frag">0%</span></div>
        <div class="stat-card">Status: <span id="warn">SISTEMA OK</span></div>
    </div>

    <div class="disk-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-save" onclick="saveFile()">Novo Arquivo (Random)</button>
        <button class="btn-del" onclick="deleteFile()">Apagar Arquivo ID</button>
        <button class="btn-rec" onclick="recoverFile()">Recuperação Forense</button>
        <button class="btn-def" id="def-btn" onclick="defragment()" style="opacity: 0.5;">Desfragmentar</button>
        <button style="background:#546e7a" onclick="location.reload()">Resetar Disco</button>
    </div>

    <div id="log">> Aguardando comando...</div>

    <script>
        const total = 100;
        let disk = Array(total).fill(null); // {id: N, status: 'active'|'deleted'|'corrupted'}
        let fileIdCounter = 1;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<total; i++) {
                const b = document.createElement('div');
                b.className = 'block';
                b.id = `b${i}`;
                grid.appendChild(b);
            }
        }

        async function saveFile() {
            const size = Math.floor(Math.random() * 10) + 1;
            const speed = parseInt(document.getElementById('speed').value);
            let slots = [];

            for(let i=0; i<total && slots.length < size; i++) {
                if(!disk[i] || disk[i].status === 'deleted') slots.push(i);
            }

            if(slots.length < size) return log("ERRO: Espaço insuficiente!");

            for(let pos of slots) {
                await new Promise(r => setTimeout(r, speed));
                disk[pos] = { id: fileIdCounter, status: 'active' };
                renderBlock(pos);
            }
            log(`Arquivo ID:${fileIdCounter} (${size} blocos) gravado.`);
            fileIdCounter++;
            updateStats();
        }

        function deleteFile() {
            const id = prompt("Qual o ID do arquivo que deseja apagar?");
            if(!id) return;
            let found = false;
            disk.forEach((b, i) => {
                if(b && b.id == id && b.status === 'active') {
                    b.status = 'deleted';
                    renderBlock(i);
                    found = true;
                }
            });
            if(found) log(`Arquivo ${id} marcado como excluído.`);
            updateStats();
        }

        function recoverFile() {
            const id = prompt("Qual ID deseja tentar recuperar?");
            if(!id) return;
            
            // Verifica se o arquivo já foi parcialmente sobrescrito
            let originalBlocks = disk.filter(b => b && b.id == id);
            if(originalBlocks.length === 0) return log("ERRO: Rastros do arquivo não encontrados.");

            disk.forEach((b, i) => {
                if(b && b.id == id && b.status === 'deleted') {
                    b.status = 'active'; // Recuperado com sucesso
                } else if (b && b.id != id && originalBlocks.some(ob => ob === b)) {
                    // Aqui simulamos a lógica de que o bloco foi ocupado por outro ID
                    // O aluno verá que o arquivo recuperado terá blocos corrompidos
                }
            });
            
            // Simulação Visual: Se houver blocos faltando do ID original, marcamos como corrompido
            log(`Tentativa de recuperação do ID ${id} concluída.`);
            updateStats();
        }

        async function defragment() {
            log("Iniciando Otimização de Disco...");
            let activeBlocks = disk.filter(b => b && b.status === 'active');
            disk.fill(null);
            init(); // Limpa visual
            
            for(let i=0; i<activeBlocks.length; i++) {
                await new Promise(r => setTimeout(r, 50));
                disk[i] = activeBlocks[i];
                renderBlock(i);
            }
            log("Disco Otimizado e Desfragmentado.");
            updateStats();
        }

        function renderBlock(i) {
            const el = document.getElementById(`b${i}`);
            const data = disk[i];
            el.className = 'block';
            el.innerText = '';
            if(data) {
                el.innerText = `ID:${data.id}`;
                if(data.status === 'active') el.classList.add('file-active');
                if(data.status === 'deleted') el.classList.add('file-deleted');
                if(data.status === 'corrupted') el.classList.add('file-corrupted');
            }
        }

        function updateStats() {
            let gaps = 0;
            for(let i=1; i<total; i++) {
                if(!disk[i] && disk[i-1]) gaps++;
            }
            const fragPercent = Math.min(gaps * 10, 100);
            document.getElementById('frag').innerText = fragPercent + "%";
            
            const warn = document.getElementById('warn');
            const btn = document.getElementById('def-btn');
            if(fragPercent > 30) {
                warn.innerText = "ALTA FRAGMENTAÇÃO!";
                warn.className = "alert-active";
                btn.style.opacity = "1";
            } else {
                warn.innerText = "SISTEMA OK";
                warn.className = "";
                btn.style.opacity = "0.5";
            }
        }

        function log(m) { document.getElementById('log').innerText = "> " + m; }
        init();
    </script>
</body>
</html>
