<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Disco - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .dashboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; min-width: 150px; }
        
        /* Grade do Disco */
        .disk-grid { 
            display: grid; grid-template-columns: repeat(10, 40px); gap: 4px; 
            justify-content: center; background: #252525; padding: 10px; border-radius: 5px; border: 2px solid #444; margin: 0 auto; width: fit-content;
        }
        .block { width: 40px; height: 40px; background: #333; border-radius: 2px; transition: 0.3s; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Estados dos Blocos */
        .occupied { background: #2196F3; box-shadow: inset 0 0 5px rgba(255,255,255,0.2); }
        .deleted { background: #555 !important; border: 1px dashed #aaa; color: #aaa; } /* Dado ainda lá, mas livre */
        .corrupted { background: #f44336 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .controls { margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tech-selector { grid-column: span 2; background: #1e1e1e; padding: 10px; border-radius: 8px; }
        
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-save { background: #4CAF50; color: white; }
        .btn-del { background: #ff9800; color: white; }
        .btn-rec { background: #9c27b0; color: white; }
        .btn-def { background: #00bcd4; color: white; }
        
        select { padding: 10px; background: #333; color: white; border: 1px solid #555; }
        #status-log { margin-top: 20px; color: #00e676; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Simulador de Armazenamento Pro</h1>

    <div class="dashboard">
        <div class="tech-selector">
            Tecnologia: 
            <select id="drive-tech" onchange="updateTech()">
                <option value="500">HD Mecânico (Lento - Latência Alta)</option>
                <option value="100">SSD SATA (Rápido)</option>
                <option value="20">NVMe M.2 (Ultra Rápido)</option>
            </select>
        </div>
        <div class="stat-card">Fragmentação: <span id="frag-val">0%</span></div>
        <div class="stat-card">Saúde: <span id="health-val">100%</span></div>
    </div>

    <div class="disk-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-save" onclick="saveFile(4)">Salvar Arquivo (4 blocos)</button>
        <button class="btn-del" onclick="deleteRandom()">Deletar Arquivo Aleatório</button>
        <button class="btn-rec" onclick="recoverData()">Recuperar Dados (Forensics)</button>
        <button class="btn-def" onclick="defragment()">Otimizar/Desfragmentar</button>
        <button style="background: #607d8b; color: white;" onclick="corruptRandom()">Simular Corrupção</button>
    </div>

    <div id="status-log">> Sistema pronto. Aguardando operações...</div>

    <script>
        const totalBlocks = 100;
        let disk = Array(totalBlocks).fill(null); // null = vazio, {id, status: 'active'|'deleted'|'corrupted'}
        let fileCounter = 1;
        let writeSpeed = 500;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<totalBlocks; i++) {
                const div = document.createElement('div');
                div.className = 'block';
                div.id = `block-${i}`;
                grid.appendChild(div);
            }
        }

        function updateTech() {
            writeSpeed = parseInt(document.getElementById('drive-tech').value);
            log(`Tecnologia alterada. Velocidade de gravação: ${1000 - writeSpeed} MB/s est.`);
        }

        async function saveFile(size) {
            let found = [];
            // Busca blocos livres (null ou deleted)
            for(let i=0; i<totalBlocks && found.length < size; i++) {
                if(!disk[i] || disk[i].status === 'deleted') found.push(i);
            }

            if(found.length < size) {
                log("ERRO: Espaço insuficiente ou disco muito fragmentado!");
                return;
            }

            for(let idx of found) {
                await new Promise(r => setTimeout(r, writeSpeed));
                disk[idx] = { id: fileCounter, status: 'active' };
                const el = document.getElementById(`block-${idx}`);
                el.className = 'block occupied';
                el.innerText = 'F' + fileCounter;
            }
            fileCounter++;
            checkFragmentation();
            log("Arquivo gravado com sucesso.");
        }

        function deleteRandom() {
            const activeFiles = [...new Set(disk.filter(b => b && b.status === 'active').map(b => b.id))];
            if(activeFiles.length === 0) return;
            
            const targetId = activeFiles[Math.floor(Math.random() * activeFiles.length)];
            disk.forEach((block, i) => {
                if(block && block.id === targetId) {
                    block.status = 'deleted';
                    const el = document.getElementById(`block-${i}`);
                    el.className = 'block deleted';
                }
            });
            log(`Arquivo ${targetId} removido da tabela de alocação (Dados ainda no disco).`);
        }

        function recoverData() {
            let recovered = 0;
            disk.forEach((block, i) => {
                if(block && block.status === 'deleted') {
                    block.status = 'active';
                    document.getElementById(`block-${i}`).className = 'block occupied';
                    recovered++;
                }
            });
            log(`Forense: ${recovered} blocos recuperados com sucesso!`);
        }

        function corruptRandom() {
            const occupied = disk.map((b, i) => b && b.status === 'active' ? i : null).filter(i => i !== null);
            if(occupied.length === 0) return;
            const target = occupied[Math.floor(Math.random() * occupied.length)];
            disk[target].status = 'corrupted';
            document.getElementById(`block-${target}`).className = 'block corrupted';
            document.getElementById('health-val').innerText = "92% (Atenção!)";
            log("ALERTA: Setor defeituoso detectado. Arquivo corrompido.");
        }

        function checkFragmentation() {
            let gaps = 0;
            for(let i=1; i<totalBlocks; i++) {
                if(disk[i] && !disk[i-1]) gaps++;
            }
            document.getElementById('frag-val').innerText = Math.min(gaps * 5, 100) + "%";
        }

        function log(msg) {
            document.getElementById('status-log').innerText = "> " + msg;
        }

        initGrid();
    </script>
</body>
</html>
