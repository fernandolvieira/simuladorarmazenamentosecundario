<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FileSystem Expert - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; text-align: center; padding: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-width: 950px; margin: 0 auto 15px; }
        .stat-card { background: #1e1e1e; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 0.9rem; }
        
        .disk-grid { 
            display: grid; grid-template-columns: repeat(10, 42px); gap: 4px; 
            justify-content: center; background: #222; padding: 12px; border-radius: 8px; border: 2px solid #444; margin: 0 auto; width: fit-content;
        }
        .block { 
            width: 42px; height: 42px; background: #333; border-radius: 3px; font-size: 0.65rem; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s; font-weight: bold; border: 1px solid #111;
        }
        
        .file-active { background: #1976D2; color: white; } 
        .file-deleted { background: #424242; color: #777; border: 1px dashed #666; } 
        .file-recovered { background: #FBC02D; color: #000; } 
        .file-corrupted { background: #D32F2F; color: white; animation: pulse 1s infinite; } 
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .controls { margin-top: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 950px; margin-left: auto; margin-right: auto; }
        .tech-box { grid-column: span 3; background: #1e1e1e; padding: 8px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #333; }
        
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; font-size: 0.85rem; }
        button:hover { filter: brightness(1.2); }
        .btn-save { background: #2e7d32; }
        .btn-del { background: #d84315; }
        .btn-rec { background: #6a1b9a; }
        .btn-def { background: #0277bd; }
        .btn-format { background: #fbc02d; color: #000; }
        .btn-zero { background: #000; border: 1px solid #555; }
        
        #log { margin-top: 15px; font-family: 'Courier New', monospace; color: #00e676; background: #000; padding: 10px; border-radius: 4px; height: 35px; border: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:10px;">Simulador: Ciclo de Vida do Dado e Perícia</h2>

    <div class="dashboard">
        <div class="tech-box">
            Hardware: 
            <select id="speed" style="padding:4px; background:#333; color:#fff; border:1px solid #555;">
                <option value="400">HDD (Mecânico)</option>
                <option value="100">SSD SATA</option>
                <option value="20">NVMe M.2</option>
            </select>
        </div>
        <div class="stat-card">Fragmentação: <span id="frag">0%</span></div>
        <div class="stat-card">Capacidade: <span id="cap">0</span>/100</div>
        <div class="stat-card" id="warn">SISTEMA OK</div>
    </div>

    <div class="disk-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-save" onclick="saveFile()">Salvar (1-10)</button>
        <button class="btn-del" onclick="deleteFile()">Deletar ID</button>
        <button class="btn-rec" onclick="recoverFile()">Forense (Recuperar)</button>
        
        <button class="btn-format" onclick="formatDrive()">Formatação Rápida</button>
        <button class="btn-def" onclick="defragment()">Desfragmentar</button>
        <button class="btn-zero" onclick="zeroFill()">Zero Fill (Seguro)</button>
    </div>

    <div id="log">> Terminal iniciado. Selecione uma operação.</div>

    <script>
        const total = 100;
        let disk = Array(total).fill(null); 
        let fileIdCounter = 1;
        let fileMetadata = {}; 

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<total; i++) {
                const b = document.createElement('div');
                b.className = 'block';
                b.id = `b${i}`;
                grid.appendChild(b);
            }
        }

        async function saveFile() {
            const size = Math.floor(Math.random() * 10) + 1;
            const speed = parseInt(document.getElementById('speed').value);
            let slots = [];

            for(let i=0; i<total && slots.length < size; i++) {
                if(!disk[i] || disk[i].status === 'deleted') slots.push(i);
            }

            if(slots.length < size) return log("FALHA: Espaço insuficiente no volume.");

            fileMetadata[fileIdCounter] = { size: size, originalPositions: [...slots] };

            for(let pos of slots) {
                await new Promise(r => setTimeout(r, speed));
                disk[pos] = { id: fileIdCounter, status: 'active' };
                renderBlock(pos);
            }
            log(`FILE_ID:${fileIdCounter} gravado (${size} clusters).`);
            fileIdCounter++;
            updateStats();
        }

        function deleteFile() {
            const id = prompt("Digite o ID do arquivo para exclusão lógica:");
            if(!id) return;
            let found = false;
            disk.forEach((b, i) => {
                if(b && b.id == id && b.status === 'active') {
                    b.status = 'deleted';
                    renderBlock(i);
                    found = true;
                }
            });
            if(found) log(`ID:${id} deletado da Tabela de Alocação.`);
            updateStats();
        }

        async function recoverFile() {
            const id = prompt("ID para análise forense:");
            if(!id || !fileMetadata[id]) return log("Rastro de arquivo não identificado.");
            
            log(`Escaneando setores magnéticos...`);
            await new Promise(r => setTimeout(r, 1200));

            let meta = fileMetadata[id];
            let corruptedCount = 0;

            meta.originalPositions.forEach(pos => {
                if(disk[pos] && disk[pos].id == id && disk[pos].status === 'deleted') {
                    disk[pos].status = 'recovered';
                    renderBlock(pos);
                } 
                else if (!disk[pos] || disk[pos].id != id) {
                    corruptedCount++;
                    for(let i=0; i<total; i++) {
                        if(!disk[i]) {
                            disk[i] = { id: id, status: 'corrupted' };
                            renderBlock(i);
                            break;
                        }
                    }
                }
            });

            log(corruptedCount === 0 ? "INTEGRIDADE: 100%. Arquivo recuperado." : `AVISO: ${corruptedCount} clusters sobrescritos/perdidos.`);
            updateStats();
        }

        function formatDrive() {
            if(!confirm("Deseja realizar a Formatação Rápida? Os dados físicos permanecerão.")) return;
            disk.forEach(b => { if(b) b.status = 'deleted'; });
            log("Formatação rápida concluída. Índice limpo.");
            refreshAll();
            updateStats();
        }

        async function zeroFill() {
            if(!confirm("ALERTA: O Zero Fill destruirá os dados permanentemente. Continuar?")) return;
            log("Iniciando sobrescrita de segurança (Zero Fill)...");
            for(let i=0; i<total; i++) {
                if(disk[i]) {
                    await new Promise(r => setTimeout(r, 20));
                    disk[i] = null;
                    renderBlock(i);
                }
            }
            fileMetadata = {};
            log("WIPE CONCLUÍDO: Todos os setores limpos.");
            updateStats();
        }

        async function defragment() {
            log("Reorganizando clusters contíguos...");
            let active = disk.filter(b => b && b.status !== 'deleted');
            disk.fill(null);
            refreshAll();
            for(let i=0; i<active.length; i++) {
                await new Promise(r => setTimeout(r, 30));
                disk[i] = active[i];
                if(disk[i].status !== 'active') disk[i].status = 'active';
                renderBlock(i);
            }
            log("Desfragmentação e limpeza de rastros concluída.");
            updateStats();
        }

        function renderBlock(i) {
            const el = document.getElementById(`b${i}`);
            const data = disk[i];
            el.className = 'block'; el.innerText = '';
            if(data) {
                el.innerText = `ID:${data.id}`;
                el.classList.add(`file-${data.status}`);
            }
        }

        function refreshAll() { for(let i=0; i<total; i++) renderBlock(i); }

        function updateStats() {
            let gaps = 0, used = 0;
            disk.forEach((b, i) => { 
                if(b && b.status === 'active') used++; 
                if(i > 0 && !disk[i] && disk[i-1]) gaps++;
            });
            document.getElementById('frag').innerText = (gaps * 10) + "%";
            document.getElementById('cap').innerText = used;
        }

        function log(m) { document.getElementById('log').innerText = "> " + m; }
        init();
    </script>
</body>
</html>
